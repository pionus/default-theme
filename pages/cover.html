{{template "layout" .}}

{{define "title"}}Life feeds on negative entropy{{end}}

{{define "content"}}
<section class="hero" id="particles-bg">
    <div class="hero-content">
        <h1>Life feeds on negative entropy</h1>
        <p>Secbone's Blog</p>
    </div>
</section>
<section class="latest-posts">
    <h2>Latest Articles</h2>
    {{range .Articles}}
    <a class="article-card" href="/article/{{.Slug}}">
        <h3>{{.Title}}</h3>
        <time>{{.CreatedAt.Format "2006-01-02"}}</time>
    </a>
    {{end}}
</section>
{{end}}

{{define "script"}}
<script src="https://cdn.bootcss.com/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS('particles-bg', {
        particles: {
            number: { value: 200 },
            color: { value: "#2196f3" },
            size: { value: 3 },
            line_linked: { enable: true, color: "#2196f3", opacity: 0.3 },
            move: { direction: "right", speed: 1 }
        },
        retina_detect: true
    });
</script>
{{end}}
