{{template "layout" .}}

{{define "title"}}Secbone's Blog{{end}}

{{define "content"}}
<section class="hero">
  <p class="hero__greeting">Hey, I'm</p>
  <h1 class="hero__name">Secbone</h1>
  <p class="hero__bio">
    软件工程师，写代码、写文字。<br>
    <span class="hero__quote">Life feeds on negative entropy.</span>
  </p>
  <div class="hero__links">
    <a href="https://github.com/secbone">GitHub</a>
  </div>
</section>

<section style="padding-top: var(--space-xl);">
  <div class="section-header">
    <h2 class="section-title">最近的文章</h2>
    <a href="/article" class="section-more">全部文章 →</a>
  </div>
  {{range .Articles}}
  <a href="/article/{{.Slug}}" class="post-entry">
    <div class="post-entry__title">{{.Title}}</div>
    <div class="post-entry__meta">{{.CreatedAt.Format "2006-01-02"}}</div>
  </a>
  {{end}}
</section>
{{end}}

{{define "scripts"}}{{end}}
